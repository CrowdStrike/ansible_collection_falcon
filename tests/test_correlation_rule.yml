---
# Test playbook for correlation_rule and correlation_rule_info modules
#
# Prerequisites:
#   - FALCON_CLIENT_ID and FALCON_CLIENT_SECRET environment variables set
#   - API client must have Correlation Rules [READ, WRITE] and Sensor Download [READ] scopes
#
# Usage:
#   ansible-playbook tests/test_correlation_rule.yml -v
#
# Environment variables:
#   FALCON_CLIENT_ID     - API client ID (required)
#   FALCON_CLIENT_SECRET - API client secret (required)
#   FALCON_CLOUD         - Falcon cloud region (optional, defaults to us-1)
#
# Note: The Correlation Rules API has a backend provisioning phase where newly created
# rules enter a "creating" transition state. During this period, rules cannot be updated
# or deleted. This playbook accounts for that behavior.

- name: Validate correlation_rule and correlation_rule_info modules
  hosts: localhost
  connection: local
  gather_facts: false

  vars:
    test_rule_name: "Ansible Test Rule - {{ ansible_facts.date_time.iso8601_basic_short }}"
    test_search:
      filter: "#event_simpleName=ProcessRollup2"
      lookback: "5m"
      outcome: "detection"
    test_operation:
      schedule:
        definition: "*/5 * * * *"

  pre_tasks:
    - name: Gather minimal facts for timestamp
      ansible.builtin.setup:
        gather_subset:
          - date_time

    - name: Validate required environment variables
      ansible.builtin.assert:
        that:
          - lookup('env', 'FALCON_CLIENT_ID') | length > 0
          - lookup('env', 'FALCON_CLIENT_SECRET') | length > 0
        fail_msg: "FALCON_CLIENT_ID and FALCON_CLIENT_SECRET environment variables must be set"

  tasks:
    - name: Run CRUD lifecycle tests
      block:
        # =================================================================
        # Phase 1: CREATE
        # =================================================================

        - name: "CREATE | Create a correlation rule"
          crowdstrike.falcon.correlation_rule:
            name: "{{ test_rule_name }}"
            severity: 30
            status: active
            search: "{{ test_search }}"
            operation: "{{ test_operation }}"
          register: create_result

        - name: "CREATE | Verify rule was created"
          ansible.builtin.assert:
            that:
              - create_result is changed
              - create_result.correlation_rule is defined
              - create_result.correlation_rule.name == test_rule_name
              - create_result.correlation_rule.id | length > 0
              - create_result.correlation_rule.customer_id | length > 0
              - create_result.correlation_rule.severity == 30
              - create_result.correlation_rule.search.filter == test_search.filter
              - create_result.correlation_rule.search.lookback == test_search.lookback
              - create_result.correlation_rule.search.outcome == test_search.outcome
              - create_result.correlation_rule.operation.schedule.definition == "*/5 * * * *"
            fail_msg: "Rule creation failed or returned unexpected data"

        - name: Save rule ID
          ansible.builtin.set_fact:
            rule_id: "{{ create_result.correlation_rule.id }}"

        # =================================================================
        # Phase 2: READ - Verify via info module
        # =================================================================

        - name: "READ | Get rule by ID"
          crowdstrike.falcon.correlation_rule_info:
            rule_ids:
              - "{{ rule_id }}"
          register: info_by_id

        - name: "READ | Verify info by ID"
          ansible.builtin.assert:
            that:
              - info_by_id.correlation_rules | length == 1
              - info_by_id.correlation_rules[0].id == rule_id
              - info_by_id.correlation_rules[0].name == test_rule_name
              - info_by_id.meta.pagination.total == 1
            fail_msg: "Info lookup by ID returned unexpected data"

        - name: "READ | Search rules by name filter"
          crowdstrike.falcon.correlation_rule_info:
            filter: "name:'{{ test_rule_name }}'"
          register: info_by_filter

        - name: "READ | Verify filter search found the rule"
          ansible.builtin.assert:
            that:
              - info_by_filter.correlation_rules | length >= 1
              - >-
                info_by_filter.correlation_rules
                | selectattr('id', 'equalto', rule_id)
                | list | length == 1
            fail_msg: "Filter search did not find the created rule"

        # =================================================================
        # Phase 3: IDEMPOTENCY - Module skips update during transition
        # =================================================================

        - name: "IDEMPOTENT | Re-run with same parameters (rule in transition)"
          crowdstrike.falcon.correlation_rule:
            name: "{{ test_rule_name }}"
            severity: 30
          register: idempotent_result

        - name: "IDEMPOTENT | Verify no changes during transition"
          ansible.builtin.assert:
            that:
              - idempotent_result is not changed
              - idempotent_result.correlation_rule.id == rule_id
            fail_msg: "Module should skip updates while rule is in transition state"

        # =================================================================
        # Phase 4: INFO MODULE - Pagination, sorting, latest version
        # =================================================================

        - name: "INFO | Test pagination"
          crowdstrike.falcon.correlation_rule_info:
            limit: 5
            offset: 0
          register: info_paginated

        - name: "INFO | Verify pagination metadata"
          ansible.builtin.assert:
            that:
              - info_paginated.meta is defined
              - info_paginated.meta.pagination.limit == 5
              - info_paginated.meta.pagination.offset == 0
              - info_paginated.correlation_rules | length <= 5
            fail_msg: "Pagination metadata is incorrect"

        - name: "INFO | Test sort by last updated"
          crowdstrike.falcon.correlation_rule_info:
            sort: "last_updated_on"
            limit: 10
          register: info_sorted

        - name: "INFO | Verify sorted results returned"
          ansible.builtin.assert:
            that:
              - info_sorted.correlation_rules is defined
            fail_msg: "Sorted query failed"

        - name: "INFO | Get rule with latest version info"
          crowdstrike.falcon.correlation_rule_info:
            rule_ids:
              - "{{ rule_id }}"
            include_latest_version: true
          register: info_with_version

        - name: "INFO | Verify latest version field is present"
          ansible.builtin.assert:
            that:
              - info_with_version.correlation_rules[0].latest_version is defined
            fail_msg: "Latest version info was not included"

        # =================================================================
        # Phase 5: AUTH TOKEN PASSTHROUGH
        # =================================================================

        - name: "AUTH | Generate access token via auth module"
          crowdstrike.falcon.auth:
          register: falcon_auth

        - name: "AUTH | Query using access token"
          crowdstrike.falcon.correlation_rule_info:
            auth: "{{ falcon_auth.auth }}"
            rule_ids:
              - "{{ rule_id }}"
          register: auth_info

        - name: "AUTH | Verify token auth query succeeded"
          ansible.builtin.assert:
            that:
              - auth_info.correlation_rules | length == 1
            fail_msg: "Query with token auth failed"

        # =================================================================
        # Phase 6: ABSENT IDEMPOTENCY (non-existent rule)
        # =================================================================

        - name: "ABSENT | Delete non-existent rule by name (idempotent)"
          crowdstrike.falcon.correlation_rule:
            name: "This Rule Does Not Exist - 999999"
            state: absent
          register: absent_noop

        - name: "ABSENT | Verify no change for non-existent rule"
          ansible.builtin.assert:
            that:
              - absent_noop is not changed
            fail_msg: "Absent state should be no-op for non-existent rules"

      # ===================================================================
      # ALWAYS: Best-effort cleanup
      # ===================================================================
      always:
        - name: "CLEANUP | Remove test rule (may fail if still in transition)"
          crowdstrike.falcon.correlation_rule:
            name: "{{ test_rule_name }}"
            state: absent
          ignore_errors: true
